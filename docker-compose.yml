services:
  upnext_server:
    build:
      dockerfile: Upnext.WebApi/Dockerfile
      context: apps/server/
    container_name: upnext_server
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      upnext_postgres:
        condition: service_healthy

  upnext_postgres:
    image: "postgres"
    container_name: upnext_postgres
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "upnext"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    driver: bridge
